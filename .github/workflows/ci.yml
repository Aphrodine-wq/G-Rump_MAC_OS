name: G-Rump CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer

jobs:
  critical-tests:
    name: Critical Tool Tests
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Resolve packages
        run: swift package resolve

      - name: Build & run tests
        run: swift test --parallel -j $(sysctl -n hw.ncpu)

  lint:
    name: Code Quality
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint
        run: |
          if command -v swiftlint &>/dev/null; then
            swiftlint lint --strict --reporter github-actions-logging Sources/GRump/ || exit 1
          else
            echo "::warning::SwiftLint not installed, skipping lint checks"
          fi

      - name: Check for force unwraps (non-constant)
        run: |
          # Allow documented constant force unwraps (swiftlint:disable comments)
          VIOLATIONS=$(grep -rn ')!' Sources/GRump/*.swift Sources/GRump/**/*.swift 2>/dev/null \
            | grep -v 'swiftlint:disable' \
            | grep -v 'isEmpty' \
            | grep -v '.filter' \
            | grep -v '.contains' \
            | grep -v '// ' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "⚠️  Potential force unwraps found (review needed):"
            echo "$VIOLATIONS"
          fi

      - name: Check for print() statements
        run: |
          PRINTS=$(grep -rn --include='*.swift' 'print(' Sources/GRump/ 2>/dev/null \
            | grep -v 'Text("print' \
            | grep -v "python3.*print" \
            | grep -v "bc.*print" \
            || true)
          if [ -n "$PRINTS" ]; then
            echo "❌ Found print() — use GRumpLogger instead:"
            echo "$PRINTS"
            exit 1
          fi

      - name: Verify PrivacyInfo.xcprivacy exists
        run: test -f Sources/GRump/Resources/PrivacyInfo.xcprivacy

      - name: Verify LICENSE exists
        run: test -f LICENSE

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-ci-secret-key
          CORS_ORIGIN: http://localhost:3000

  release:
    name: Release Build
    runs-on: macos-14
    timeout-minutes: 30
    needs: [critical-tests, lint, backend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-v2-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-v2-

      - name: Build Release
        run: swift build -c release -j $(sysctl -n hw.ncpu)

      - name: Package .app bundle
        run: make app

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: G-Rump-${{ github.sha }}
          path: dist/G-Rump.app
          retention-days: 30
